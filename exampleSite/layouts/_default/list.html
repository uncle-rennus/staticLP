{{- define "main" -}}
{{- if and (eq .Kind "section") (.Param "campaign") -}}
{{- partial "staticlp/landing.html" . -}}
{{- else -}}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{- with .Description -}}<p>{{ . }}</p>{{- end -}}
</header>
<div class="post-content">{{ .Content }}</div>
{{- end -}}
{{- end -}}
